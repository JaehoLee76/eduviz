<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>수학의 세계</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  /* ── 스타일 중앙화: DOM 색·치수 단일 소스. 추후 일괄 변경은 여기만 수정 ──
     (캔버스 그래픽 색은 engine.js 의 COL 객체가 단일 소스) */
  :root {
    --accent:#d8814a; --accent-light:#ffb27a; --accent-soft:rgba(216,129,74,0.16);
    --panel-bg:rgba(22,22,30,0.97); --border:rgba(255,255,255,0.12);
    --text-1:#f4f3ee; --text-2:#bcbab2; --text-3:#6f6e7a;
    --radius:14px;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(125% 125% at 50% 0%, #16161f 0%, #0b0b10 62%);
    color: #f4f3ee; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    user-select: none; touch-action: none; transition: background .45s ease;
  }
  /* 분기(세부 학습) 모드 — 화면 전체를 오렌지로 틴트해 "세부 내용 학습 중"을 또렷이 인지 (가독성 유지) */
  body.in-branch { background: radial-gradient(125% 125% at 50% 0%, #4a3318 0%, #1a1109 66%); }
  /* 버튼 단축키 표시 */
  .kc { display: inline-block; font-size: 10px; line-height: 1; padding: 2px 5px; margin-left: 5px; border: 1px solid currentColor; border-radius: 5px; opacity: .55; font-family: ui-monospace, monospace; font-weight: 600; vertical-align: middle; }
  .btn:disabled .kc { opacity: .3; }
  #stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  /* 상단바 */
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 6; display: flex; align-items: center; gap: 16px; padding: 14px 20px; }
  .home-link { color: #6f6e7a; font-size: 14px; text-decoration: none; white-space: nowrap; }
  .home-link:hover { color: #cfcdc6; }
  .titles { flex: 1; text-align: center; line-height: 1.3; }
  .titles .sec { font-size: 12px; color: #8a8893; letter-spacing: .14em; text-transform: uppercase; }
  .titles .ttl { font-size: 15px; color: #ece9e0; font-weight: 500; }
  .scene-no { position: fixed; top: 48px; left: 20px; z-index: 8; font-size: 12px; color: var(--accent-light); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 999px; padding: 2px 11px; letter-spacing: .05em; font-weight: 500; }
  .toc-toggle { background: none; border: 1px solid rgba(255,255,255,0.14); color: #cfcdc6; width: 36px; height: 36px; border-radius: 9px; cursor: pointer; font-size: 16px; }
  .toc-toggle:hover { background: rgba(255,255,255,0.08); }
  .progress { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); z-index: 7; }
  .progress #bar { height: 100%; width: 0; background: #ffb27a; transition: width .4s; }

  /* 캐릭터 + 말풍선 */
  .guide { position: fixed; left: 26px; bottom: 24px; z-index: 5; display: flex; align-items: flex-end; gap: 13px; max-width: 64%; }
  .guide .ch { width: 56px; height: 56px; flex: 0 0 56px; animation: bob 3.2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-7px);} }
  .bubble { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; border-bottom-left-radius: 4px;
    padding: 12px 16px; font-size: 15.5px; line-height: 1.6; color: #ece9e0; backdrop-filter: blur(6px); transition: opacity .35s; max-width: 480px; }
  .bubble.fade { opacity: 0; }
  .bubble b { color: #ffd9bd; font-weight: 500; }

  /* 큰 숫자/식 오버레이 */
  .bignum { position: fixed; top: 13%; left: 0; right: 0; text-align: center; z-index: 4; pointer-events: none; transition: opacity .3s; }
  .bignum.hidden { opacity: 0; }
  .bignum #bigN { font-size: 56px; font-weight: 200; color: #ffb27a; line-height: 1.05; }
  .bignum #bigW { font-size: 16px; color: #8a8893; margin-top: 6px; letter-spacing: .06em; }

  /* 컨트롤(슬라이더 등) */
  #controls { position: fixed; bottom: 96px; left: 0; right: 0; z-index: 5; display: none; justify-content: center; }
  #controls .ctrl { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); padding: 10px 18px; border-radius: 12px; }
  #controls label { font-size: 14px; color: #b9b7b0; }
  #controls output { font-family: ui-monospace, monospace; font-size: 14px; color: #ffb27a; min-width: 26px; text-align: right; }
  input[type=range] { width: 180px; accent-color: #d8814a; }

  /* 문제풀이 퀴즈 */
  .quiz { display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); padding: 16px 22px; border-radius: 14px; max-width: 92vw; }
  .quiz .q { font-size: 17px; color: #f4f3ee; font-weight: 500; }
  .quiz .opts { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .quiz .opt { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); color: #f4f3ee; padding: 10px 20px; border-radius: 10px; font-size: 16px; cursor: pointer; font-family: inherit; min-width: 56px; }
  .quiz .opt:hover { background: rgba(255,255,255,0.13); }
  .quiz .opt.ok { background: rgba(143,227,181,0.22); border-color: #8fe3b5; color: #8fe3b5; }
  .quiz .opt.no { background: rgba(226,75,74,0.18); border-color: #e24b4a; color: #f0a0a0; }
  .quiz .fb { font-size: 14px; color: #8a8893; min-height: 18px; }
  .quiz .fb.ok { color: #8fe3b5; } .quiz .fb.no { color: #f0a0a0; }

  /* 하단 내비 */
  .nav { position: fixed; bottom: 26px; right: 26px; z-index: 6; display: flex; gap: 10px; align-items: center; }
  .nav .hint { color: #6f6e7a; font-size: 13px; margin-right: 6px; max-width: 200px; text-align: right; }
  .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); color: #f4f3ee; padding: 9px 18px; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: rgba(255,255,255,0.12); }
  .btn.primary { background: #d8814a; border-color: #d8814a; }
  .btn.primary:hover { background: #e6915a; }
  .btn:disabled { opacity: .3; cursor: default; }

  /* TOC 패널 */
  #toc-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 80vw; background: rgba(18,18,24,0.97); border-left: 1px solid rgba(255,255,255,0.1);
    z-index: 9; transform: translateX(100%); transition: transform .3s; overflow-y: auto; padding: 64px 8px 24px; }
  #toc-panel.open { transform: translateX(0); }
  .toc-sec { font-size: 12px; color: #8a8893; letter-spacing: .08em; padding: 14px 16px 6px; text-transform: uppercase; }
  .toc-item { font-size: 14.5px; color: #cfcdc6; padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  .toc-item:hover { background: rgba(255,255,255,0.06); }
  .toc-item.active { background: rgba(216,129,74,0.18); color: #ffb27a; }
  .toc-sub { padding-left: 30px; font-size: 13.5px; color: #9b99a3; }
  .toc-sub:hover { background: rgba(255,255,255,0.05); }
  .crumb { position: fixed; top: 74px; left: 20px; z-index: 8; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; max-width: 72vw; font-size: 12px; line-height: 1.4; }
  .crumb-seg { color: var(--text-3); }
  .crumb-seg.clk { cursor: pointer; color: var(--text-2); }
  .crumb-seg.clk:hover { color: var(--accent-light); text-decoration: underline; }
  .crumb-seg.cur { color: var(--accent-light); font-weight: 600; }
  .crumb-seg.branch { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 7px; padding: 1px 8px; }
  .crumb-sep { color: var(--text-3); opacity: .55; }
  .btn.branch-in { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-light); }
  .btn.branch-out { background: rgba(255,255,255,0.06); border-color: var(--accent); color: var(--accent-light); }

  /* ── 펼침 학습 패널 (자세히 설명 + 문제) ── */
  #study { position: fixed; left: 26px; bottom: 108px; z-index: 7; display: none; flex-direction: column; align-items: flex-start; width: min(460px, 44vw); }
  .study-body { max-height: 0; overflow: hidden; opacity: 0; width: 100%;
    background: var(--panel-bg); border: 1px solid var(--border); border-radius: var(--radius);
    transition: max-height .38s ease, opacity .3s ease, padding .38s ease; }
  #study.open .study-body { max-height: 56vh; overflow-y: auto; opacity: 1; padding: 16px 18px; margin-bottom: 10px; overscroll-behavior: contain; }
  .study-body::-webkit-scrollbar { width: 9px; }
  .study-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.20); border-radius: 5px; }
  .study-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }
  .study-body::-webkit-scrollbar-track { background: transparent; }
  .study-body { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.20) transparent; }
  .study-section { font-size: 14.5px; line-height: 1.72; color: var(--text-2); }
  .study-section h4 { font-size: 14px; color: var(--accent-light); margin: 0 0 8px; font-weight: 600; letter-spacing: .02em; }
  .study-section b { color: var(--text-1); font-weight: 600; }
  .study-section + .study-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .prob-q { color: var(--text-1); }
  .sol-toggle { margin-top: 12px; background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent-light);
    padding: 7px 15px; border-radius: 9px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .sol-toggle:hover { background: rgba(216,129,74,0.26); }
  .prob-sol { margin-top: 12px; font-size: 14px; line-height: 1.74; color: var(--text-2); display: none; }
  .prob-sol.show { display: block; }
  .prob-sol b { color: var(--accent-light); font-weight: 600; }
  /* 영어 동시 학습 블록 (스크롤 다운 시 한국어 아래) */
  .en-block { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border); line-height: 1.7; color: var(--text-3); }
  .en-tag { font-size: 10px; letter-spacing: .15em; color: var(--accent-light); margin-bottom: 6px; font-weight: 600; }
  .en-block b { color: var(--text-2); font-weight: 600; }
  .en-text { color: var(--text-3); font-size: 13.5px; line-height: 1.65; }
  .en-text b { color: var(--text-2); font-weight: 600; }

  /* 둥실거리는 꺽쇠(^^) 화살표 — 위로 펼치기 어포던스 */
  .chev-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 12px; }
  .chev-svg { animation: chevFloat 2.6s ease-in-out infinite; overflow: visible; }
  .chev-c1 { animation: chevGapT 1.7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .chev-c2 { animation: chevGapB 1.7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes chevFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes chevGapT { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3.5px); } }
  @keyframes chevGapB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3.5px); } }
  .chev-label { font-size: 12px; color: var(--accent); letter-spacing: .05em; }
  #study.open .chev-svg { transform: scaleY(-1); animation: none; }
  #study.open .chev-c1, #study.open .chev-c2 { animation: none; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="progress"><div id="bar"></div></div>

<div class="topbar">
  <a class="home-link" href="home.html">← 홈</a>
  <span class="scene-no" id="sceneNo">#1</span>
  <div class="titles"><div class="sec" id="sceneSec">제1장</div><div class="ttl" id="sceneTitle">수의 세계</div></div>
  <button class="toc-toggle" id="toc-toggle" aria-label="목차">≡</button>
</div>
<div class="crumb" id="crumb"></div>

<div class="bignum hidden" id="bignum"><div id="bigN"></div><div id="bigW"></div></div>

<div id="controls"></div>

<div class="guide">
  <svg class="ch" viewBox="0 0 60 60" aria-hidden="true">
    <path d="M30 6 L54 50 Q56 54 50 54 L10 54 Q4 54 6 50 Z" fill="#ffb27a"/>
    <circle id="eyeL" cx="23" cy="40" r="3.4" fill="#1a1a22"/>
    <circle id="eyeR" cx="37" cy="40" r="3.4" fill="#1a1a22"/>
  </svg>
  <div class="bubble" id="bubble">…</div>
</div>

<div id="study">
  <div class="study-body" id="studyBody">
    <div class="study-section" id="studyMore"></div>
    <div class="study-section" id="studyProblem"></div>
  </div>
  <button class="chev-btn" id="chevBtn" aria-label="자세히 보기">
    <svg class="chev-svg" viewBox="0 0 40 30" width="42" height="32" aria-hidden="true">
      <defs><linearGradient id="chevGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffe0c6"/><stop offset="1" stop-color="#d8814a"/>
      </linearGradient></defs>
      <polyline class="chev-c1" points="7,13 20,4 33,13" fill="none" stroke="url(#chevGrad)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline class="chev-c2" points="7,25 20,16 33,25" fill="none" stroke="url(#chevGrad)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="chev-label" id="chevLabel">자세히 보기</span>
  </button>
</div>

<div class="nav">
  <span class="hint" id="hint"></span>
  <button class="btn" id="branchBtn" style="display:none"></button>
  <button class="btn" id="prev" disabled>◂ 이전</button>
  <button class="btn primary" id="next">다음 ▸</button>
</div>

<div id="toc-panel"><div id="toc"></div></div>

<script>
  (function(){ var v='?v='+Date.now();
    ['js/engine.js','js/content_ch1.js','js/content_ch2.js','js/content_ch3.js','js/content_ch4.js','js/content_ch5.js','js/content_ch6.js','js/content_ch7.js','js/content_ch8.js','js/content_ch9.js','js/content_ch10.js','js/content_ch11.js','js/content_ch12.js','js/content_ch13.js','js/content_ch14.js','js/content_ch15.js','js/content_ch16.js','js/content_ch17.js','js/content_ch18.js','js/content_ch19.js','js/content_ch20.js','js/content_ch21.js','js/content_ch22.js','js/content_ch23.js','js/content_ch24.js','js/content_ch25.js','js/content_ch26.js','js/content_math_br.js','js/chat-config.js','js/chat.js'].forEach(function(s){ document.write('<scr'+'ipt src="'+s+v+'"></scr'+'ipt>'); });
  })();
</script>
<script>
  Engine.start({ canvas: 'stage', content: ['content/ch1.json','content/ch2.json','content/ch3.json','content/ch4.json','content/ch5.json','content/ch6.json','content/ch7.json','content/ch8.json','content/ch9.json','content/ch10.json','content/ch11.json','content/ch12.json','content/ch13.json','content/ch14.json','content/ch15.json','content/ch16.json','content/ch17.json','content/ch18.json','content/ch19.json','content/ch20.json','content/ch21.json','content/ch22.json','content/ch23.json','content/ch24.json','content/ch25.json','content/ch26.json','content/math_br.json'] });
</script>
</body>
</html>
