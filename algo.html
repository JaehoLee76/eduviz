<meta name="viewport" content="width=device-width, initial-scale=1">

<title>알고리즘의 세계</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  /* ── 알고리즘 트랙: 파란 테마(수학=주황과 구별). 캔버스 색은 engine.js COL 공유 ── */
  :root {
    --accent:#4f93d6; --accent-light:#7ab8ff; --accent-soft:rgba(79,147,214,0.16);
    --panel-bg:rgba(22,22,30,0.97); --border:rgba(255,255,255,0.12);
    --text-1:#f4f3ee; --text-2:#bcbab2; --text-3:#6f6e7a;
    --radius:14px;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(125% 125% at 50% 0%, #16161f 0%, #0b0b10 62%);
    color: #f4f3ee; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    user-select: none; touch-action: none; transition: background .45s ease;
  }
  /* 분기(세부 학습) 모드 — 화면 전체를 오렌지로 틴트해 "세부 내용 학습 중"을 또렷이 인지 (단 content 가독성 유지) */
  body.in-branch { background: radial-gradient(125% 125% at 50% 0%, #4a3318 0%, #1a1109 66%); }
  body.in-branch #codepanel { background: rgba(42,30,16,0.96); transition: background .45s ease; }
  /* 버튼 단축키 표시 */
  .kc { display: inline-block; font-size: 10px; line-height: 1; padding: 2px 5px; margin-left: 5px; border: 1px solid currentColor; border-radius: 5px; opacity: .55; font-family: ui-monospace, monospace; font-weight: 600; vertical-align: middle; }
  .btn:disabled .kc { opacity: .3; }
  #stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 6; display: flex; align-items: center; gap: 16px; padding: 14px 20px; }
  .home-link { color: var(--accent-light,#cfcdc6); font-size: 26px; font-weight: 700; text-decoration: none; white-space: nowrap; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
  .home-link:hover { color: #ffffff; }
  .titles { flex: 1; text-align: center; line-height: 1.3; }
  .titles .sec { font-size: 13px; color: #8a8893; letter-spacing: .12em; text-transform: uppercase; }
  .titles .ttl { font-size: 20px; color: #ece9e0; font-weight: 600; line-height: 1.25; }
  .scene-no { position: fixed; top: 48px; left: 20px; z-index: 8; font-size: 12px; color: var(--accent-light); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 999px; padding: 2px 11px; letter-spacing: .05em; font-weight: 500; }
  .toc-toggle { background: none; border: 1px solid rgba(255,255,255,0.14); color: #cfcdc6; width: 36px; height: 36px; border-radius: 9px; cursor: pointer; font-size: 16px; }
  .toc-toggle:hover { background: rgba(255,255,255,0.08); }
  .progress { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); z-index: 7; }
  .progress #bar { height: 100%; width: 0; background: var(--accent-light); transition: width .4s; }

  /* 좌측 하단 스택: 더 알아보기(위) → 말풍선(아래). 컨테이너 바닥 고정·위로 자람 → 겹침 불가(수학과 통일) */
  #leftStack { position: fixed; left: 26px; bottom: 24px; z-index: 7; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; max-width: 64%; }
  .guide { position: static; display: flex; align-items: flex-end; gap: 13px; max-width: 100%; }
  body.study-open .guide { display: none; }   /* 더 알아보기 펼치면 요약 말풍선 숨김(겹침·시선분산 차단) */
  .guide .ch { width: 56px; height: 56px; flex: 0 0 56px; animation: bob 3.2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-7px);} }
  .bubble { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; border-bottom-left-radius: 4px;
    padding: 12px 16px; font-size: 15.5px; line-height: 1.6; color: #ece9e0; backdrop-filter: blur(6px); transition: opacity .35s; max-width: 480px; }
  .bubble.fade { opacity: 0; }
  .bubble b { color: #bfe0ff; font-weight: 500; }

  .bignum { position: fixed; top: 13%; left: 0; right: 0; text-align: center; z-index: 4; pointer-events: none; transition: opacity .3s; }
  .bignum.hidden { opacity: 0; }
  .bignum #bigN { font-size: 56px; font-weight: 200; color: #7ab8ff; line-height: 1.05; }
  .bignum #bigW { font-size: 16px; color: #8a8893; margin-top: 6px; letter-spacing: .06em; }

  #controls { position: fixed; bottom: 96px; left: 0; right: 0; z-index: 5; display: none; justify-content: center; }
  #controls .sl-unit { display: flex; flex-direction: column; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); padding: 9px 16px 8px; border-radius: 12px; }
  #controls .sl-row { display: flex; align-items: center; gap: 10px; }
  #controls .ctrl { display: flex; align-items: center; gap: 12px; }
  #controls label { font-size: 14px; color: #b9b7b0; }
  #controls output { font-family: ui-monospace, monospace; font-size: 14px; color: #7ab8ff; min-width: 26px; text-align: right; }
  /* 키 조작 힌트 바(스택 push/pop 등) — 단축키 밝게 */
  #keyhint { display: none; position: fixed; bottom: 96px; left: 0; right: 0; z-index: 5; justify-content: center; gap: 18px; pointer-events: none; }
  .kh-item { display: inline-flex; align-items: center; gap: 7px; background: rgba(20,20,28,0.86); border: 1px solid var(--accent); border-radius: 10px; padding: 6px 13px; font-size: 14px; color: var(--text-1); font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .kh-item .kc { opacity: 1; color: var(--accent-light); border-color: var(--accent-light); font-size: 12.5px; margin: 0; }
  input[type=range] { width: 180px; accent-color: #4f93d6; }

  .quiz { display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); padding: 16px 22px; border-radius: 14px; max-width: 92vw; }
  .quiz .q { font-size: 17px; color: #f4f3ee; font-weight: 500; }
  .quiz .opts { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .quiz .opt { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); color: #f4f3ee; padding: 10px 20px; border-radius: 10px; font-size: 16px; cursor: pointer; font-family: inherit; min-width: 56px; }
  .quiz .opt:hover { background: rgba(255,255,255,0.13); }
  .quiz .opt.ok { background: rgba(143,227,181,0.22); border-color: #8fe3b5; color: #8fe3b5; }
  .quiz .opt.no { background: rgba(226,75,74,0.18); border-color: #e24b4a; color: #f0a0a0; }
  .quiz .fb { font-size: 14px; color: #8a8893; min-height: 18px; }
  .quiz .fb.ok { color: #8fe3b5; } .quiz .fb.no { color: #f0a0a0; }

  .nav { position: fixed; bottom: 26px; right: 26px; z-index: 6; display: flex; gap: 10px; align-items: center; }
  .nav .hint { color: #6f6e7a; font-size: 13px; margin-right: 6px; max-width: 200px; text-align: right; }
  .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); color: #f4f3ee; padding: 9px 18px; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn:hover { background: rgba(255,255,255,0.12); }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.primary:hover { background: #5fa0e2; }
  .btn:disabled { opacity: .3; cursor: default; }

  #toc-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 80vw; background: rgba(18,18,24,0.97); border-left: 1px solid rgba(255,255,255,0.1);
    z-index: 9; transform: translateX(100%); transition: transform .3s; overflow-y: auto; padding: 64px 8px 24px; }
  #toc-panel.open { transform: translateX(0); }
  .toc-sec { font-size: 12px; color: #8a8893; letter-spacing: .08em; padding: 14px 16px 6px; text-transform: uppercase; }
  .toc-item { font-size: 14.5px; color: #cfcdc6; padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  .toc-item:hover { background: rgba(255,255,255,0.06); }
  .toc-item.active { background: rgba(79,147,214,0.18); color: #7ab8ff; }
  .toc-sub { padding-left: 30px; font-size: 13.5px; color: #9b99a3; }
  .toc-sub:hover { background: rgba(255,255,255,0.05); }

  /* 위치 breadcrumb (현재 어디에 있는지 + 분기 계층) */
  .crumb { position: fixed; top: 74px; left: 20px; z-index: 8; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; max-width: 72vw; font-size: 12px; line-height: 1.4; }
  .crumb-seg { color: var(--text-3); }
  .crumb-seg.clk { cursor: pointer; color: var(--text-2); }
  .crumb-seg.clk:hover { color: var(--accent-light); text-decoration: underline; }
  .crumb-seg.cur { color: var(--accent-light); font-weight: 600; }
  .crumb-seg.branch { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 7px; padding: 1px 8px; }
  .crumb-sep { color: var(--text-3); opacity: .55; }
  /* 분기 진입/복귀 버튼 */
  .btn.branch-in { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-light); }
  .btn.branch-out { background: rgba(255,255,255,0.06); border-color: var(--accent); color: var(--accent-light); }

  #study { position: static; display: none; flex-direction: column; align-items: flex-start; width: min(460px, 44vw); }
  .study-body { max-height: 0; overflow: hidden; opacity: 0; width: 100%;
    background: var(--panel-bg); border: 1px solid var(--border); border-radius: var(--radius);
    transition: max-height .38s ease, opacity .3s ease, padding .38s ease; }
  #study.open .study-body { max-height: 56vh; overflow-y: auto; opacity: 1; padding: 16px 18px; margin-bottom: 10px; overscroll-behavior: contain; }
  .study-body::-webkit-scrollbar { width: 9px; }
  .study-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.20); border-radius: 5px; }
  .study-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }
  .study-body::-webkit-scrollbar-track { background: transparent; }
  .study-body { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.20) transparent; }
  .study-section { font-size: 14.5px; line-height: 1.72; color: var(--text-2); }
  .study-section h4 { font-size: 14px; color: var(--accent-light); margin: 0 0 8px; font-weight: 600; letter-spacing: .02em; }
  .study-section b { color: var(--text-1); font-weight: 600; }
  .study-section + .study-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .prob-q { color: var(--text-1); }
  .sol-toggle { margin-top: 12px; background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent-light);
    padding: 7px 15px; border-radius: 9px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .sol-toggle:hover { background: rgba(79,147,214,0.26); }
  .prob-sol { margin-top: 12px; font-size: 14px; line-height: 1.74; color: var(--text-2); display: none; }
  .prob-sol.show { display: block; }
  .prob-sol b { color: var(--accent-light); font-weight: 600; }
  .en-block { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border); line-height: 1.7; color: var(--text-3); }
  .en-tag { font-size: 10px; letter-spacing: .15em; color: var(--accent-light); margin-bottom: 6px; font-weight: 600; }
  .en-block b { color: var(--text-2); font-weight: 600; }
  .en-text { color: var(--text-3); font-size: 13.5px; line-height: 1.65; }
  .en-text b { color: var(--text-2); font-weight: 600; }

  .chev-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 12px; }
  .chev-svg { animation: chevFloat 2.6s ease-in-out infinite; overflow: visible; }
  .chev-c1 { animation: chevGapT 1.7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .chev-c2 { animation: chevGapB 1.7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes chevFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes chevGapT { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3.5px); } }
  @keyframes chevGapB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3.5px); } }
  .chev-label { font-size: 12px; color: var(--accent); letter-spacing: .05em; }
  #study.open .chev-svg { transform: scaleY(-1); animation: none; }
  #study.open .chev-c1, #study.open .chev-c2 { animation: none; }

  /* ════ VIZ 모드: 왼쪽 = 코드/설명 + 스텝 컨트롤, 오른쪽 = 애니메이션(캔버스). 시선이 왼쪽에 머물게 ════ */
  body.viz #stage { left: 42vw; width: 58vw; height: calc(100% - 150px); }     /* 캔버스 = 오른쪽 컬럼. 하단 150px = 컨트롤(키힌트·내비) 전용 안전영역 → 캔버스 그림이 버튼과 안 겹침 */
  body.viz .guide, body.viz .bignum, body.viz #study, body.viz #leftStack { display: none !important; }  /* viz(코드+시각화) 장면: 좌측 스택 숨김(설명은 좌측 코드 패널로 통합) */
  /* 하단 컨트롤 띠(캔버스 아래): 키힌트=위, 내비=아래. 서로·캔버스와 안 겹치게 고정 */
  body.viz #keyhint { bottom: 98px; }
  body.viz #controls { bottom: 98px; }
  body.viz .nav { bottom: 32px; }
  body.viz .nav .hint { display: none; }   /* 긴 hint 텍스트는 내비 버튼과 겹침 → viz에선 숨김(키힌트가 안내 대체) */
  body.viz .topbar .titles { display: none; }   /* 중앙 제목은 전체화면 중앙 정렬이라 캔버스 헤더와 겹침 → viz에선 숨김(브레드크럼+codeHead가 제목 표시) */

  /* 왼쪽 패널: 코드/설명(스크롤) → 스텝 캡션 → 스텝바 */
  #codepanel { position: fixed; top: 0; left: 0; width: 42vw; height: 100%; z-index: 5; display: none; flex-direction: column;
    background: rgba(14,14,20,0.97); border-right: 1px solid var(--border); padding: 98px 0 0; }  /* 상단 = scene-no·breadcrumb 아래로(겹침 방지) */
  body.viz #codepanel { display: flex; }
  .code-head { padding: 6px 22px 12px; color: var(--accent-light); font-size: 16.5px; font-weight: 700; letter-spacing: .02em;
    border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 코드창 입력 데이터 배지 — 코드만 봐도 a[]에 뭐가 든지 알게 */
  #codeInput { display: none; margin: 10px 22px 2px; padding: 7px 12px; border-radius: 9px;
    background: rgba(143,227,181,0.10); border: 1px solid rgba(143,227,181,0.4);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; color: #cfeede; }
  body.viz:not(.viz-concept) #codeInput[data-on="1"] { display: block; }
  #codeInput .ik { color: #8fe3b5; font-weight: 700; }
  .code-body { flex: 0 1 auto; max-height: 42vh; overflow-y: auto; padding: 12px 0 14px; }
  body.viz-concept #codeBody { display: none; }                                   /* 개념 장면: 코드영역 없음 */
  /* 자세히보기 스크롤 영역 + Q/Z 스크롤 힌트 */
  .concept-wrap { flex: 1 1 auto; min-height: 0; position: relative; display: flex; }
  .concept-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; }            /* 핵심요약/연습문제 = 스텝 아래 스크롤 */
  .concept-scroll::-webkit-scrollbar { width: 9px; }
  .concept-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
  .sk { position: absolute; right: 16px; z-index: 4; pointer-events: none; display: flex; align-items: center; gap: 5px;
    background: rgba(20,20,28,0.88); border: 1px solid var(--accent); border-radius: 8px; padding: 3px 9px;
    font-size: 11.5px; color: var(--text-1); font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: opacity .2s; }
  .sk .kc { opacity: 1; color: var(--accent-light); border-color: var(--accent-light); margin: 0; }
  .sk-up { top: 6px; } .sk-dn { bottom: 10px; }
  .sk.hidden { opacity: 0; }
  .codelines { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13.5px; line-height: 1.65; }
  .code-body::-webkit-scrollbar { width: 9px; }
  .code-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
  .cl { display: flex; gap: 14px; padding: 1px 22px; white-space: pre; }
  .cl .ln { color: #4d5360; flex: 0 0 24px; text-align: right; user-select: none; }
  .cl .ct { color: #c2cbd8; }
  .cl.on { background: rgba(79,147,214,0.26); box-shadow: inset 3px 0 0 var(--accent-light); }
  .cl.on .ct { color: #ffffff; font-weight: 600; }
  .codeextra { border-top: 1px solid var(--border); margin-top: 10px; }

  /* 스텝 캡션·컨트롤 = 왼쪽 패널 하단(코드와 같은 쪽) */
  #stepcap { display: none; margin: 12px 18px 8px; background: rgba(122,184,255,0.08);
    border: 1px solid var(--border); border-left: 3px solid var(--accent-light); border-radius: 11px; padding: 12px 15px; }
  body.viz:not(.viz-concept) #stepcap, body.stepped #stepcap { display: block; }    /* 코드/개념 단계 STEP 캡션 */
  #stepcap .stp { font-size: 13px; color: var(--accent-light); font-weight: 800; letter-spacing: .08em; margin-bottom: 5px; }
  #stepcap .cap { font-size: 15px; color: #ece9e0; line-height: 1.55; }
  #stepcap .cap b { color: #bfe0ff; font-weight: 600; }
  #stepbar { display: none; padding: 4px 14px 16px; justify-content: center; gap: 8px; flex-wrap: wrap; }
  body.viz:not(.viz-concept) #stepbar, body.stepped #stepbar { display: flex; }

  body.viz #controls { left: 42vw; right: 0; }   /* 슬라이더 = 오른쪽(캔버스) 컬럼 중앙 */
  body.viz #keyhint { left: 42vw; right: 0; }
  .ctrl-keys { font-size: 12px; color: var(--text-1); margin: 0; font-weight: 500; white-space: nowrap; }
  .ctrl-keys .kc { opacity: 1; color: var(--accent-light); border-color: var(--accent-light); font-size: 11px; }

  /* 설명 패널 본문 (개념 + 코드 보충 공통) */
  .concept { padding: 8px 22px 24px; font-size: 14.5px; line-height: 1.72; color: var(--text-2); }
  .cpt-intro { color: #dfeefb; margin-bottom: 16px; line-height: 1.7; }
  .cpt-intro b { color: #bfe0ff; font-weight: 600; }
  .cpt-sec { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .cpt-h { color: var(--accent-light); font-weight: 700; font-size: 12.5px; letter-spacing: .05em; margin-bottom: 8px; }
  /* concept 장면 구현 코드 블록(라인번호+가벼운 키워드 강조) */
  .implcode { background: rgba(8,10,16,0.66); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 11px 6px; margin-top: 2px; overflow-x: auto; }
  .implcode .il { display: flex; white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.62; }
  .implcode .iln { color: #444a57; min-width: 30px; text-align: right; padding-right: 13px; flex: 0 0 auto; -webkit-user-select: none; user-select: none; }
  .implcode .ic { color: #d2dbe8; }
  .implcode .ck { color: #7ab8ff; }
  .implcode .cc { color: #6f8a6f; font-style: italic; }
  .concept b { color: var(--text-1); font-weight: 600; }
  .cpt-sec.en, .concept .en { color: var(--text-3); font-size: 13.5px; }
  .cpt-sec.en b, .concept .en b { color: var(--text-2); }
  .cpt-sol { margin-top: 10px; }
  .cpt-sol summary { cursor: pointer; color: var(--accent-light); font-size: 13.5px; }
  .cpt-sol b { color: var(--accent-light); }
  .sbtn { background: var(--accent-soft); border: 1px solid var(--accent); color: #dceeff; padding: 8px 14px; border-radius: 10px; font-size: 13.5px; cursor: pointer; font-family: inherit; }
  .sbtn:hover { background: rgba(79,147,214,0.3); }
  .sbtn:disabled { opacity: .3; cursor: default; }
  .sbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* 마우스 클릭/단축키 후 포커스 링이 한 버튼에만 남는 현상 제거 — 키보드 Tab 접근성은 유지 */
  .sbtn:focus:not(:focus-visible), .btn:focus:not(:focus-visible) { outline: none; }
  .sbtn:focus-visible, .btn:focus-visible { outline: 2px solid var(--accent-light); outline-offset: 2px; }
  /* 퀴즈 옵션 번호 키 */
  .quiz .opt .optk { display: inline-block; min-width: 16px; margin-right: 7px; padding: 1px 5px; border: 1px solid currentColor; border-radius: 5px; font-size: 11px; opacity: .65; }
  @media (max-width: 760px) {
    body.viz #stage { left: 0; width: 100vw; height: 50vh; }
    #codepanel { top: auto; bottom: 0; left: 0; width: 100vw; height: 50vh; padding-top: 10px; border-right: none; border-top: 1px solid var(--border); }
    body.viz #controls { left: 0; right: 0; }
  }
  /* 시네마틱 인트로: 좌측 말풍선·자세히보기·bignum 숨기고 캔버스 풀스크린 */
  body.cinematic #leftStack { display: none !important; }
  body.cinematic .bignum { display: none !important; }
  body.cinematic .nav .hint { display: none !important; }
  body.cinematic .scene-no, body.cinematic .crumb { opacity: 0.35; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="progress"><div id="bar"></div></div>

<div class="topbar">
  <a class="home-link" href="home.html">← 홈</a>
  <span class="scene-no" id="sceneNo">#1</span>
  <div class="titles"><div class="sec" id="sceneSec">알고리즘 제1장</div><div class="ttl" id="sceneTitle">알고리즘의 세계</div></div>
  <button class="toc-toggle" id="toc-toggle" aria-label="목차">≡</button>
</div>
<div class="crumb" id="crumb"></div>

<div class="bignum hidden" id="bignum"><div id="bigN"></div><div id="bigW"></div></div>

<div id="controls"></div>
<div id="keyhint"></div>

<!-- 좌측 하단 세로 스택: 더 알아보기(위) + 기본설명 말풍선(아래). 겹침 구조적 방지(수학과 통일) -->
<div id="leftStack">
  <div id="study">
    <div class="study-body" id="studyBody">
      <div class="study-section" id="studyMore"></div>
      <div class="study-section" id="studyProblem"></div>
    </div>
    <button class="chev-btn" id="chevBtn" aria-label="더 알아보기">
      <svg class="chev-svg" viewBox="0 0 40 30" width="42" height="32" aria-hidden="true">
        <defs><linearGradient id="chevGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c6e3ff"/><stop offset="1" stop-color="#4f93d6"/>
        </linearGradient></defs>
        <polyline class="chev-c1" points="7,13 20,4 33,13" fill="none" stroke="url(#chevGrad)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline class="chev-c2" points="7,25 20,16 33,25" fill="none" stroke="url(#chevGrad)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="chev-label" id="chevLabel">더 알아보기</span>
    </button>
  </div>
  <div class="guide">
    <svg class="ch" viewBox="0 0 60 60" aria-hidden="true">
      <path d="M30,7 L35.6,22.3 L51.9,22.9 L39.0,32.9 L43.5,48.6 L30,39.5 L16.5,48.6 L21.0,32.9 L8.1,22.9 L24.4,22.3 Z" fill="#7ab8ff"/>
      <ellipse id="eyeL" cx="24" cy="27" rx="2.9" ry="2.9" fill="#16161f"/>
      <ellipse id="eyeR" cx="36" cy="27" rx="2.9" ry="2.9" fill="#16161f"/>
    </svg>
    <div class="bubble" id="bubble">…</div>
  </div>
</div>

<div class="nav">
  <span class="hint" id="hint"></span>
  <button class="btn" id="branchBtn" style="display:none"></button>
  <button class="btn" id="prev" disabled>◂ 이전</button>
  <button class="btn primary" id="next">다음 ▸</button>
</div>

<!-- VIZ: 왼쪽 패널 = 코드/설명 + 단계 설명 + 스텝 컨트롤 / 오른쪽 = 애니메이션(캔버스) -->
<div id="codepanel">
  <div class="code-head" id="codeHead"></div>
  <div id="codeInput"></div>
  <div class="code-body" id="codeBody"></div>
  <div id="stepcap"><div class="stp" id="stepStp"></div><div class="cap" id="stepCap"></div></div>
  <div id="stepbar">
    <button class="sbtn" id="sbPrev">◂ 이전 <kbd class="kc">A</kbd></button>
    <button class="sbtn primary" id="sbNext">다음 단계 ▸ <kbd class="kc">D</kbd></button>
    <button class="sbtn" id="sbAuto">▶ 자동 재생 <kbd class="kc">S</kbd></button>
    <button class="sbtn" id="sbReset">↺ 초기화 <kbd class="kc">X</kbd></button>
  </div>
  <div class="concept-wrap" id="conceptWrap">
    <div class="concept-scroll" id="conceptExtra"></div>
    <div class="sk sk-up hidden" id="skUp"><kbd class="kc">Q</kbd> ▲ 위로</div>
    <div class="sk sk-dn hidden" id="skDn">▼ 아래로 <kbd class="kc">Z</kbd></div>
  </div>
</div>

<div id="toc-panel"><div id="toc"></div></div>

<script>
  (function(){ var v='?v='+Date.now();
    ['js/engine.js','js/algo_helpers.js','js/content_algo0.js','js/content_algo1.js','js/content_algo2.js','js/content_algo3.js','js/content_algo4.js','js/content_algo5.js','js/content_algo6.js','js/content_algo7.js','js/content_algo8.js','js/content_algo_br.js','js/chat-config.js','js/chat.js','js/account.js'].forEach(function(s){ document.write('<scr'+'ipt src="'+s+v+'"></scr'+'ipt>'); });
  })();
</script>
<script>
  Engine.start({ canvas: 'stage', content: ['content/algo0.json','content/algo1.json','content/algo2.json','content/algo3.json','content/algo4.json','content/algo5.json','content/algo6.json','content/algo7.json','content/algo8.json','content/algo_br.json'] });
</script>
</body>
</html>
