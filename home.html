<script>
(function(){
  var cv=document.getElementById('stage'), ctx=cv.getContext('2d'), W,H,DPR;
  function fit(){ DPR=window.devicePixelRatio||1; W=innerWidth; H=innerHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  fit(); addEventListener('resize',fit);
  var N=70, p=[];
  for(var i=0;i<N;i++) p.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.6+.6});
  function loop(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<N;i++){ var a=p[i]; a.x+=a.vx; a.y+=a.vy;
      if(a.x<0||a.x>W)a.vx*=-1; if(a.y<0||a.y>H)a.vy*=-1;
      ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,7); ctx.fill();
    }
    for(var i=0;i<N;i++) for(var j=i+1;j<N;j++){ var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=dx*dx+dy*dy;
      if(d<11000){ ctx.strokeStyle='rgba(255,255,255,'+(0.06*(1-d/11000))+')'; ctx.lineWidth=.5; ctx.beginPath(); ctx.moveTo(p[i].x,p[i].y); ctx.lineTo(p[j].x,p[j].y); ctx.stroke(); } }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<script>
(function(){
  var inp=document.getElementById('hsInput'), box=document.getElementById('hsResults'), clr=document.getElementById('hsClear');
  var IDX=null, ICON={math:'📐',calculus:'∫',algo:'🧮',ai:'🤖',python:'🐍',physics:'⚛',bda:'📊',cpp:'⧺',hygiene:'⛑'};
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function hi(s,q){ s=esc(s); if(!q) return s; try{ return s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }catch(e){ return s; } }
  function load(cb){ if(IDX){ cb(); return; }
    fetch('content/search_index.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){ IDX=d; cb(); }).catch(function(){ IDX=[]; cb(); }); }
  function render(){ var q=inp.value.trim(); clr.style.display=q?'block':'none';
    if(!q){ box.classList.remove('open'); box.innerHTML=''; return; }
    load(function(){ var ql=q.toLowerCase(), res=[];
      for(var i=0;i<IDX.length;i++){ var x=IDX[i];
        if(((x.ti||'')+' '+(x.se||'')+' '+(x.ch||'')+' '+(x.nr||'')).toLowerCase().indexOf(ql)>=0){ res.push(x); if(res.length>=80) break; } }
      if(!res.length){ box.innerHTML='<div class="hs-empty">「'+esc(q)+'」 검색 결과가 없습니다.</div>'; box.classList.add('open'); return; }
      box.innerHTML=res.map(function(x){ return '<a class="hs-item" href="'+x.p+'#scene='+encodeURIComponent(x.s)+'">'
        +'<span class="hs-badge">'+(ICON[x.t]||'•')+' '+esc(x.tn)+'</span>'
        +'<span class="hs-tx"><b>'+hi(x.ti||'(제목 없음)',q)+'</b><i>'+hi((x.ch?x.ch+' · ':'')+(x.se||''),q)+'</i></span></a>'; }).join('');
      box.classList.add('open'); });
  }
  inp.addEventListener('input',render);
  clr.onclick=function(){ inp.value=''; render(); inp.focus(); };
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&(e.key==='f'||e.key==='F')){ e.preventDefault(); inp.focus(); inp.select(); }
    else if(e.key==='Escape'){ if(document.activeElement===inp){ inp.value=''; render(); inp.blur(); } }
  },true);
  document.addEventListener('click',function(e){ if(!e.target.closest('.home-search')) box.classList.remove('open'); });
})();
</script>
