<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 290" width="240" height="290">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1622"/>
      <stop offset="1" stop-color="#06090e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#5ab4e8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#5ab4e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a6660"/>
      <stop offset="1" stop-color="#4a4742"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c4a6"/>
      <stop offset="1" stop-color="#c79f7c"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3f52"/>
      <stop offset="1" stop-color="#1c2b3a"/>
    </linearGradient>
  </defs>
  <rect width="240" height="290" rx="16" fill="url(#bg)"/>
  <rect width="240" height="290" rx="16" fill="url(#glow)"/>
  <!-- shoulders / shirt -->
  <path d="M38 290 Q38 220 120 212 Q202 220 202 290 Z" fill="url(#shirt)"/>
  <!-- collar hint -->
  <path d="M100 214 Q120 232 140 214 L140 226 Q120 244 100 226 Z" fill="#d8e2ea" opacity="0.5"/>
  <!-- neck -->
  <rect x="104" y="194" width="32" height="30" rx="12" fill="#c79f7c"/>
  <!-- head -->
  <ellipse cx="120" cy="136" rx="57" ry="63" fill="url(#skin)"/>
  <!-- ears -->
  <ellipse cx="65" cy="140" rx="9" ry="14" fill="#c79f7c"/>
  <ellipse cx="175" cy="140" rx="9" ry="14" fill="#c79f7c"/>
  <!-- hair: receding, side volume, graying -->
  <path d="M62 118 Q60 74 120 70 Q180 74 178 118 Q182 92 158 84 Q150 100 120 98 Q90 100 82 84 Q58 92 62 118 Z" fill="url(#hair)"/>
  <path d="M60 132 Q54 100 70 88 L74 130 Z" fill="url(#hair)"/>
  <path d="M180 132 Q186 100 170 88 L166 130 Z" fill="url(#hair)"/>
  <!-- eyebrows -->
  <path d="M84 126 Q99 120 112 125" stroke="#5c584f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M128 125 Q141 120 156 126" stroke="#5c584f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- glasses (rounded rectangles) -->
  <rect x="80" y="132" width="34" height="26" rx="9" fill="#0c1420" fill-opacity="0.16" stroke="#33404d" stroke-width="3.2"/>
  <rect x="126" y="132" width="34" height="26" rx="9" fill="#0c1420" fill-opacity="0.16" stroke="#33404d" stroke-width="3.2"/>
  <path d="M114 143 Q120 139 126 143" stroke="#33404d" stroke-width="3.2" fill="none"/>
  <path d="M80 142 L68 138 M160 142 L172 138" stroke="#33404d" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="97" cy="145" r="3.4" fill="#3a3228"/>
  <circle cx="143" cy="145" r="3.4" fill="#3a3228"/>
  <!-- nose -->
  <path d="M120 150 L115 168 Q120 172 125 168" stroke="#a9805c" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- thick mustache (his signature) -->
  <path d="M92 176 Q120 168 148 176 Q150 190 120 190 Q90 190 92 176 Z" fill="url(#hair)"/>
  <path d="M120 176 L120 186" stroke="#3e3b36" stroke-width="1.5" opacity="0.5"/>
  <!-- mouth under mustache -->
  <path d="M104 194 Q120 200 136 194" stroke="#8a5a44" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- C++ blue rim light -->
  <path d="M64 118 Q58 76 120 72" stroke="#5ab4e8" stroke-width="2" fill="none" opacity="0.28"/>
</svg>
