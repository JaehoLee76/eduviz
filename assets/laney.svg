<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 290" width="240" height="290">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241019"/>
      <stop offset="1" stop-color="#0d0710"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ff7ab8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff7ab8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="290" rx="16" fill="url(#bg)"/>
  <rect width="240" height="290" rx="16" fill="url(#glow)"/>
  <!-- 어깨/정장 흉상 -->
  <path d="M38 290 C42 234 76 214 120 214 C164 214 198 234 202 290 Z" fill="#1e1218" stroke="#d15591" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- 라펠(정장 깃) -->
  <path d="M100 219 L120 250 L108 257 Z" fill="#150d12" stroke="#d15591" stroke-opacity="0.35" stroke-width="1"/>
  <path d="M140 219 L120 250 L132 257 Z" fill="#150d12" stroke="#d15591" stroke-opacity="0.35" stroke-width="1"/>
  <!-- 넥타이 -->
  <path d="M120 233 L112 249 L120 282 L128 249 Z" fill="#d15591" opacity="0.8"/>
  <!-- 목 -->
  <path d="M104 204 L104 224 Q120 232 136 224 L136 204 Z" fill="#221420" stroke="#d15591" stroke-opacity="0.4" stroke-width="1"/>
  <!-- 두상 윤곽 -->
  <path d="M120 34 C158 34 178 64 178 102 C178 138 158 174 120 182 C82 174 62 138 62 102 C62 64 82 34 120 34 Z"
        fill="#1a0f16" stroke="#ff7ab8" stroke-width="1.6" stroke-opacity="0.75"/>
  <!-- 머릿속 3V: 한 원점에서 뻗는 세 축(Volume·Velocity·Variety) -->
  <g stroke-width="1.3" fill="none" stroke-opacity="0.55">
    <path d="M120 150 L88 66" stroke="#ff7ab8"/>
    <path d="M120 150 L120 54" stroke="#ffd27a"/>
    <path d="M120 150 L152 66" stroke="#7ab8ff"/>
  </g>
  <!-- 축을 따라 자라나는 데이터 점 -->
  <g fill="#ff7ab8" fill-opacity="0.9"><circle cx="109" cy="122" r="2.4"/><circle cx="99" cy="95" r="3"/><circle cx="91" cy="73" r="3.6"/></g>
  <g fill="#ffd27a" fill-opacity="0.9"><circle cx="120" cy="120" r="2.4"/><circle cx="120" cy="89" r="3"/><circle cx="120" cy="61" r="3.6"/></g>
  <g fill="#7ab8ff" fill-opacity="0.9"><circle cx="131" cy="122" r="2.4"/><circle cx="141" cy="95" r="3"/><circle cx="149" cy="73" r="3.6"/></g>
  <g fill="none" stroke-opacity="0.7">
    <circle cx="88" cy="66" r="5.4" stroke="#ff7ab8" stroke-width="1.3"/>
    <circle cx="120" cy="54" r="5.4" stroke="#ffd27a" stroke-width="1.3"/>
    <circle cx="152" cy="66" r="5.4" stroke="#7ab8ff" stroke-width="1.3"/>
  </g>
  <!-- 원점(개념의 발화점) -->
  <circle cx="120" cy="150" r="4.5" fill="#d15591"/>
  <circle cx="120" cy="150" r="2" fill="#ffe3f0"/>
  <!-- 안경(분석가의 인상) — 3V 위에 겹쳐 또렷하게 -->
  <g stroke="#ffa9cd" stroke-width="1.6" fill="none" opacity="0.72">
    <rect x="84" y="98" width="22" height="15" rx="4"/>
    <rect x="116" y="98" width="22" height="15" rx="4"/>
    <line x1="106" y1="104" x2="116" y2="104"/>
  </g>
</svg>
