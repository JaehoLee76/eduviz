<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 290" width="240" height="290">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1a0e"/>
      <stop offset="1" stop-color="#0a0a06"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffd343" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffd343" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfcabf"/>
      <stop offset="1" stop-color="#9a958a"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8cdb0"/>
      <stop offset="1" stop-color="#caa884"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5a78"/>
      <stop offset="1" stop-color="#27405a"/>
    </linearGradient>
  </defs>
  <rect width="240" height="290" rx="16" fill="url(#bg)"/>
  <rect width="240" height="290" rx="16" fill="url(#glow)"/>
  <!-- shoulders / shirt -->
  <path d="M40 290 Q40 222 120 214 Q200 222 200 290 Z" fill="url(#shirt)"/>
  <path d="M104 214 Q120 236 136 214 L136 224 Q120 244 104 224 Z" fill="#e8cdb0" opacity="0.85"/>
  <!-- neck -->
  <rect x="104" y="196" width="32" height="30" rx="12" fill="#caa884"/>
  <!-- head -->
  <ellipse cx="120" cy="138" rx="58" ry="64" fill="url(#skin)"/>
  <!-- ears -->
  <ellipse cx="64" cy="142" rx="9" ry="14" fill="#caa884"/>
  <ellipse cx="176" cy="142" rx="9" ry="14" fill="#caa884"/>
  <!-- hair: longish gray, parted -->
  <path d="M58 132 Q52 70 120 64 Q188 70 182 132 Q186 96 162 82 Q150 96 120 92 Q90 96 78 82 Q56 96 58 132 Z" fill="url(#hair)"/>
  <path d="M58 132 Q54 104 70 90 L72 132 Z" fill="url(#hair)"/>
  <path d="M182 132 Q186 104 170 90 L168 132 Z" fill="url(#hair)"/>
  <!-- eyebrows -->
  <path d="M86 124 Q100 118 112 124" stroke="#8a8478" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M128 124 Q140 118 154 124" stroke="#8a8478" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- round glasses -->
  <circle cx="98" cy="142" r="17" fill="#0c1118" fill-opacity="0.18" stroke="#2a2f38" stroke-width="3.4"/>
  <circle cx="142" cy="142" r="17" fill="#0c1118" fill-opacity="0.18" stroke="#2a2f38" stroke-width="3.4"/>
  <path d="M115 142 Q120 138 125 142" stroke="#2a2f38" stroke-width="3.4" fill="none"/>
  <path d="M81 140 L70 137 M159 140 L170 137" stroke="#2a2f38" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="98" cy="143" r="3.4" fill="#3a3228"/>
  <circle cx="142" cy="143" r="3.4" fill="#3a3228"/>
  <!-- nose -->
  <path d="M120 148 L116 166 Q120 170 124 166" stroke="#b08f6c" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- gray beard/mustache -->
  <path d="M84 168 Q120 186 156 168 Q160 200 120 206 Q80 200 84 168 Z" fill="url(#hair)" opacity="0.96"/>
  <path d="M104 172 Q120 180 136 172" stroke="#7d786d" stroke-width="2.5" fill="none"/>
  <!-- smile -->
  <path d="M106 184 Q120 192 134 184" stroke="#7a6a52" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- subtle Python-yellow rim light -->
  <path d="M62 132 Q56 74 120 66" stroke="#ffd343" stroke-width="2" fill="none" opacity="0.25"/>
</svg>
