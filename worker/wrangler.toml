name = "eduviz-chat"
main = "eduviz-chat-worker.js"
compatibility_date = "2024-11-01"

# 배포:
#   1) npm i -g wrangler && wrangler login
#   2) cd worker && wrangler secret put ANTHROPIC_API_KEY   (키 입력 — 코드엔 절대 넣지 않음)
#   3) wrangler deploy
#   → https://eduviz-chat.<계정>.workers.dev 주소를 js/chat-config.js 에 입력
